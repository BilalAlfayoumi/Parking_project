# Configuration Fly.io — dashboard Streamlit.
# Ajuste "app" avec un nom unique si besoin, puis : fly launch  (ou fly deploy).
app = "parking-predictor"
primary_region = "cdg" # Paris

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Sonde de santé de Streamlit.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
